        // Алгоритм перемешивания массива
        const shuffleArray = (array) => {
          const shuffled = [...array];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          return shuffled;
        };

        function App() {
          const [questions, setQuestions] = useState([]);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          const [userAnswers, setUserAnswers] = useState({});
          const [isFinished, setIsFinished] = useState(false);

          useEffect(() => {
            // Перемешиваем все 100 вопросов
            setQuestions(shuffleArray(allQuestions));
          }, []);

          const handleOptionSelect = (option, questionId) => {
            const q = questions.find(q => q.id === questionId);
            const maxSelections = q.correctAnswers.length;
            const currentSelections = userAnswers[questionId] || [];

            if (currentSelections.includes(option)) return;
            if (currentSelections.length >= maxSelections) return;

            setUserAnswers({
              ...userAnswers,
              [questionId]: [...currentSelections, option]
            });
          };

          const handleNext = () => {
            if (currentQuestionIndex < questions.length - 1) {
              setCurrentQuestionIndex(currentQuestionIndex + 1);
            } else {
              setIsFinished(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestionIndex > 0) {
              setCurrentQuestionIndex(currentQuestionIndex - 1);
            }
          };

          const restartQuiz = () => {
            setQuestions(shuffleArray(allQuestions));
            setCurrentQuestionIndex(0);
            setUserAnswers({});
            setIsFinished(false);
          };

          const calculateScore = () => {
            let score = 0;
            questions.forEach((q) => {
              const selected = userAnswers[q.id] || [];
              if (selected.length === q.correctAnswers.length) {
                const isAllCorrect = selected.every(val => q.correctAnswers.includes(val));
                if (isAllCorrect) score++;
              }
            });
            return score;
          };

          if (questions.length === 0) return <div className="min-h-screen bg-slate-50 flex items-center justify-center text-xl text-slate-500 font-semibold">Loading App...</div>;

          // Экран результатов
          if (isFinished) {
            const score = calculateScore();
            const percentage = Math.round((score / questions.length) * 100);

            return (
              <div className="min-h-screen bg-slate-50 py-8 px-4 sm:px-6 lg:px-8 font-sans text-slate-800">
                <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                  <div className="bg-indigo-600 px-6 py-8 text-center text-white">
                    <Award className="w-16 h-16 mx-auto mb-4 opacity-90" />
                    <h1 className="text-3xl font-bold mb-2">Quiz Completed!</h1>
                    <p className="text-indigo-100 text-lg">You scored {score} out of {questions.length} ({percentage}%)</p>
                  </div>

                  <div className="bg-slate-50 px-6 py-6 border-b flex justify-center">
                    <button onClick={restartQuiz} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-8 rounded-full transition-colors focus:ring-4 focus:ring-indigo-200">
                      <RotateCcw className="w-5 h-5" /> Start New Random Test
                    </button>
                  </div>

                  <div className="p-6 sm:p-8 space-y-6">
                    <h2 className="text-xl font-bold border-b pb-2 mb-4">Detailed Review</h2>
                    {questions.map((q, index) => {
                      const selected = userAnswers[q.id] || [];
                      const isPerfect = selected.length === q.correctAnswers.length && selected.every(val => q.correctAnswers.includes(val));
                      
                      return (
                        <div key={q.id} className={`p-4 rounded-xl border-2 ${isPerfect ? 'border-green-100 bg-green-50' : 'border-red-100 bg-red-50'}`}>
                          <div className="flex items-start gap-3">
                            <div className="mt-1 flex-shrink-0">
                              {isPerfect ? <CheckCircle2 className="w-6 h-6 text-green-600" /> : <XCircle className="w-6 h-6 text-red-600" />}
                            </div>
                            <div className="flex-1">
                              <h3 className="font-semibold text-slate-800 mb-2">{index + 1}. {q.question}</h3>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3 text-sm">
                                <div className="bg-white p-3 rounded-lg border border-slate-200">
                                  <p className="text-slate-500 font-medium mb-1 border-b pb-1">Your Answers:</p>
                                  {selected.length > 0 ? (
                                    <ul className="space-y-1 mt-2">
                                      {selected.map((ans, i) => (
                                        <li key={i} className={`flex items-start gap-2 ${q.correctAnswers.includes(ans) ? 'text-green-700' : 'text-red-600 line-through'}`}>• {ans}</li>
                                      ))}
                                    </ul>
                                  ) : (
                                    <span className="italic text-slate-400">No answer provided</span>
                                  )}
                                </div>
                                {!isPerfect && (
                                  <div className="bg-green-50 p-3 rounded-lg border border-green-200">
                                    <p className="text-green-800 font-medium mb-1 border-b border-green-200 pb-1">Correct Answers:</p>
                                    <ul className="space-y-1 mt-2 text-green-700 font-medium">
                                      {q.correctAnswers.map((ans, i) => <li key={i}>• {ans}</li>)}
                                    </ul>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          }

          // Экран теста
          const currentQuestion = questions[currentQuestionIndex];
          const progress = ((currentQuestionIndex) / questions.length) * 100;
          const maxSelections = currentQuestion.correctAnswers.length;
          const currentSelections = userAnswers[currentQuestion.id] || [];
          const isLocked = currentSelections.length === maxSelections;

          return (
            <div className="min-h-screen bg-slate-50 py-6 px-4 sm:px-6 lg:px-8 font-sans flex flex-col items-center justify-center">
              <div className="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col">
                
                <div className="bg-slate-200 h-2 w-full">
                  <div className="h-full bg-indigo-600 transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
                </div>

                <div className="p-6 sm:p-10 flex-1">
                  <div className="flex justify-between items-center mb-6 text-sm font-medium text-slate-500">
                    <span className="bg-indigo-50 text-indigo-700 py-1 px-3 rounded-full font-semibold">
                      Question {currentQuestionIndex + 1} of {questions.length}
                    </span>
                    {maxSelections > 1 && (
                      <span className="flex items-center gap-1 text-amber-600 bg-amber-50 px-3 py-1 rounded-full font-medium">
                        <AlertCircle className="w-4 h-4" /> Select exactly {maxSelections}
                      </span>
                    )}
                  </div>

                  <h2 className="text-xl sm:text-2xl font-bold text-slate-800 mb-8 leading-snug">
                    {currentQuestion.question}
                  </h2>

                  <div className="space-y-3">
                    {currentQuestion.options.map((option, idx) => {
                      const isSelected = currentSelections.includes(option);
                      const isCorrectOption = currentQuestion.correctAnswers.includes(option);
                      
                      let buttonStyle = "border-slate-200 hover:border-indigo-300 hover:bg-slate-50 text-slate-700";
                      let iconStyle = "text-slate-300";
                      let IconComponent = maxSelections > 1 ? Square : CircleIcon;
                      
                      if (isSelected) {
                        IconComponent = maxSelections > 1 ? CheckSquare : CheckCircle2;
                        if (isCorrectOption) {
                          buttonStyle = "border-green-500 bg-green-50 text-green-800 ring-1 ring-green-500 shadow-sm";
                          iconStyle = "text-green-500";
                        } else {
                          IconComponent = XCircle;
                          buttonStyle = "border-red-500 bg-red-50 text-red-800 ring-1 ring-red-500 shadow-sm";
                          iconStyle = "text-red-500";
                        }
                      } else if (isLocked) {
                        if (isCorrectOption) {
                          buttonStyle = "border-green-300 bg-green-50/50 text-green-700 opacity-80";
                          iconStyle = "text-green-400";
                          IconComponent = maxSelections > 1 ? CheckSquare : CheckCircle2;
                        } else {
                          buttonStyle = "border-slate-200 bg-white text-slate-400 opacity-50";
                          iconStyle = "text-slate-200";
                        }
                      }

                      return (
                        <button
                          key={idx}
                          onClick={() => handleOptionSelect(option, currentQuestion.id)}
                          disabled={isLocked || isSelected}
                          className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center gap-4 ${buttonStyle} ${(isLocked || isSelected) ? 'cursor-default' : 'cursor-pointer'}`}
                        >
                          <div className="flex-shrink-0 mt-0.5">
                            <IconComponent className={`w-6 h-6 ${iconStyle}`} />
                          </div>
                          <span className="text-base font-medium leading-tight">
                            {option}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-slate-50 px-6 sm:px-10 py-5 border-t border-slate-100 flex justify-between items-center">
                  <button onClick={handlePrevious} disabled={currentQuestionIndex === 0} className={`flex items-center gap-1 font-medium py-2 px-4 rounded-lg transition-colors ${currentQuestionIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-200 hover:text-slate-900'}`}>
                    <ChevronLeft className="w-5 h-5" /> Back
                  </button>

                  <button onClick={handleNext} disabled={!isLocked} className={`flex items-center gap-1 font-medium py-2.5 px-6 rounded-full transition-all ${!isLocked ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md hover:shadow-lg transform active:scale-95'}`}>
                    {currentQuestionIndex === questions.length - 1 ? 'Finish' : 'Next'}
                    {currentQuestionIndex !== questions.length - 1 && <ChevronRight className="w-5 h-5" />}
                  </button>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
